name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg://mrrik:mrrik@localhost:5432/mrrik
      REDIS_URL: redis://localhost:6379/0
      RUN_DB_TESTS: "1"
      RUN_REDIS_TESTS: "1"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mrrik
          POSTGRES_USER: mrrik
          POSTGRES_PASSWORD: mrrik
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mrrik -d mrrik"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Migrate database
        run: python -m alembic upgrade head

      - name: Test
        run: python -m pytest -p no:cacheprovider
