plans:
  - code: P30
    duration_days: 30
    price_usdt: 49
  - code: P90
    duration_days: 90
    price_usdt: 129

risk:
  fixed_margin_usdt: 10
  default_model: 1
  model2_weights: [0.60, 0.20, 0.10, 0.07, 0.03]
  model3_exit_roi_pct: 20
  move_sl_to_be_after_tp1: true
  max_concurrent: 10

execution:
  entry_mode: limit
  entry_fill_timeout_sec: 900
  entry_max_deviation_pct: 0.5
  margin_type: isolated
  maintenance_margin_rate_default: 0.005

sanitizer:
  decimal_shift_lo: 5
  decimal_shift_hi: 20

demo:
  start_balance_usdt: 1000
  require_api_key: false
  api_key_scope: read_only
  include_commission: false
  include_funding: false
  include_slippage: false
  taker_fee_pct: 0.04

telegram_bot:
  notify_group_name: telegram-bot-notify
  notify_consumer_name: telegram-bot-1
  notify_read_count: 100
  notify_block_ms: 5000

payment_precheck:
  trc20:
    usdt_contract: TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t
    decimals: 6
    min_confirmations: 20
    explorer_base_url: https://tronscan.org/#/transaction
  bep20:
    usdt_contract: "0x55d398326f99059fF775485246999027B3197955"
    decimals: 18
    min_confirmations: 15
    explorer_base_url: https://bscscan.com/tx
  polygon:
    usdt_contract: "0xc2132D05D31c914a87C6611C10748AEb04B58e8F"
    decimals: 6
    min_confirmations: 50
    explorer_base_url: https://polygonscan.com/tx

admin_panel:
  bind_host: "127.0.0.1"
  auth_mode: "telegram_login"
  session_ttl_sec: 43200
  telegram_auth_max_age_sec: 86400
  ip_allowlist: ["127.0.0.1", "::1"]
  require_ip_allowlist: false

retry:
  max_attempts: 3
  base_delay_sec: 0.5
  max_delay_sec: 8
  jitter_pct: 0.10
  signal_lookup_delays_sec: [0.05, 0.15, 0.4]

rate_limit:
  telegram_messages_per_second: 20
  exchange_requests_per_second: 8
  explorer_requests_per_second: 3

monitoring:
  health_stale_after_sec: 120
  alert_stream: notify
  admin_alerts_enabled: true

backup:
  enabled: true
  output_dir: backups
  keep_last: 7

testnet:
  enabled: false
  require_explicit_env: true

live_canary:
  enabled: false
  max_margin_usdt: 5
  require_confirmation_text: I_ACCEPT_REAL_MONEY_RISK
